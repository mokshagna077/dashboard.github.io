<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            display: flex;
            background-color: #f4f6f9;
        }

        /* Sidebar */
        .sidebar {
            width: 220px;
            height: 100vh;
            background: #2c3e50;
            color: white;
            padding: 20px;
        }

        .sidebar h2 {
            text-align: center;
            margin-bottom: 30px;
        }

        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
        }

        .sidebar a:hover {
            background: #34495e;
        }

        /* Main Content */
        .main {
            flex: 1;
            padding: 20px;
        }

        .header {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .card h3 {
            margin-bottom: 10px;
        }

        .card p {
            font-size: 22px;
            font-weight: bold;
            color: #3498db;
        }

        /* Table */
        .table-container {
            margin-top: 30px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        table th, table td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
            text-align: left;
        }

        table th {
            background: #3498db;
            color: white;
        }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>My Dashboard</h2>
        <a href="#">Home</a>
        <a href="#">Students</a>
        <a href="#">Courses</a>
        <a href="#">Results</a>
        <a href="#">Logout</a>
    </div>

    <!-- Main Content -->
    <div class="main">
        <div class="header">
            <h2>Welcome to Dashboard</h2>
        </div>

        <!-- Cards -->
        <div class="cards">
            <div class="card">
                <h3>Total Students</h3>
                <p>120</p>
            </div>
            <div class="card">
                <h3>Courses</h3>
                <p>4</p>
            </div>
            <div class="card">
                <h3>Exams</h3>
                <p>30</p>
            </div>
            <div class="card">
                <h3>Results</h3>
                <p>85%</p>
            </div>
        </div>

        <!-- Table -->
        <div class="table-container">
            <h3>Recent Students</h3>
            <table>
                <tr>
                    <th>Name</th>
                    <th>Course</th>
                    <th>Status</th>
                </tr>
                <tr>
                    <td>Ravi</td>
                    <td>DBMS</td>
                    <td>Completed</td>
                </tr>
                <tr>
                    <td>Anu</td>
                    <td>OS</td>
                    <td>Pending</td>
                </tr>
                <tr>
                    <td>Kiran</td>
                    <td>DS</td>
                    <td>Completed</td>
                </tr>
            </table>
        </div>

    </div>

</body>
</html>
